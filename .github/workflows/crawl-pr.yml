name: Propose new packages

# The crawler discovers popular providers / skills / MCP servers and opens a PR
# adding any that aren't in the registry yet. The PR goes through the same review
# as a human contribution. Runs daily, or on demand.
#
# Uses the built-in GITHUB_TOKEN (no PAT). This requires the org setting
# Settings → Actions → General → Workflow permissions → "Read and write" +
# "Allow GitHub Actions to create and approve pull requests".
on:
  schedule:
    - cron: '0 4 * * *' # daily at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Crawl manifests
        run: bun scripts/crawl-catalog.ts --manifests .
        env:
          # Lifts the GitHub API rate limit while crawling (skill trees, MCP stars).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Keep only newly discovered packages
        run: |
          # Revert edits to existing manifests so the PR proposes only new packages;
          # updates to existing ones stay a manual PR.
          changed=$(git diff --name-only)
          if [ -n "$changed" ]; then git checkout -- $changed; fi

      # Bot PRs (created via GITHUB_TOKEN) don't trigger the validate workflow, so
      # validate here — a bad manifest fails the run instead of opening a junk PR.
      - name: Validate
        run: bun scripts/validate.ts

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: crawler/new-packages
          title: 'Add newly discovered packages'
          commit-message: 'Add newly discovered packages (crawler)'
          body: |
            Automated proposal from the catalog crawler. Each added file is a new
            package. Review and merge to publish, or close to skip.
          add-paths: |
            mcp/*.json
            skill/*.json
            provider/*.json
