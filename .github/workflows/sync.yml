name: Sync to store

# After a PR merges to main: publish the current manifests to the store DB, then
# run an LLM quality + safety review over the changed packages (writes the verdict
# into each item and quarantines high-risk ones).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # review.ts diffs HEAD~1..HEAD

      - uses: oven-sh/setup-bun@v2

      - name: Sync manifests
        run: bun scripts/sync.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Review changed packages
        run: bun scripts/review.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Review model: set OPENAI_API_KEY (OpenAI or any relay via OPENAI_BASE_URL)
          # or ANTHROPIC_API_KEY. Without either, the review step is skipped.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          REVIEW_MODEL: ${{ vars.REVIEW_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
